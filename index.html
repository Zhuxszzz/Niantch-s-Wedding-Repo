<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>我们结婚啦 ❤️</title>
<meta property="og:title" content="我们结婚啦 ❤️">
<meta property="og:description" content="诚邀您参加我们的婚礼">
<meta property="og:image" content="https://你的域名.com/share.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
<style>
html,body{margin:0;padding:0;height:100%;font-family:"PingFang SC",sans-serif;overflow:hidden;}
.swiper{height:100%;}
.page{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px;color:white;position:relative;overflow:hidden;}
h1{font-size:32px;animation:fadeIn 2s forwards;}
p{font-size:18px;margin-top:20px;animation:fadeInUp 2s forwards;}
button{padding:12px 24px;border:none;border-radius:30px;background:#e91e63;color:white;font-size:16px;margin-top:20px;cursor:pointer;}
.music-btn{position:fixed;top:20px;right:20px;width:40px;height:40px;background:url("https://cdn-icons-png.flaticon.com/512/727/727245.png") no-repeat center;background-size:cover;animation:rotate 4s linear infinite;z-index:9999;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes rotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.page img{width:80%;border-radius:12px;margin-top:20px;}
.map-img{width:100%;border-radius:12px;margin-top:20px;}
iframe{width:100%;height:600px;border:none;border-radius:12px;}
.photo-carousel{width:90%;height:300px;margin-top:20px;}
.photo-carousel img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
canvas#particleCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
</style>
</head>
<body>

<div class="music-btn" onclick="toggleMusic()"></div>
<audio id="bgMusic" src="https://你的域名.com/music.mp3" loop></audio>

<canvas id="particleCanvas"></canvas>

<div class="swiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide page" style="background:linear-gradient(135deg,#ff9a9e,#fad0c4);">
      <h1>💍 我们结婚啦 💍</h1>
      <p>向下滑动查看邀请函</p>
    </div>

    <div class="swiper-slide page" style="background:linear-gradient(135deg,#a18cd1,#fbc2eb);">
      <h1>张三 ❤️ 李四</h1>
      <p>期待与您共享幸福时光</p>
      <div class="photo-carousel swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide"><img data-src="https://你的域名.com/photo1.jpg" class="swiper-lazy"></div>
          <div class="swiper-slide"><img data-src="https://你的域名.com/photo2.jpg" class="swiper-lazy"></div>
          <div class="swiper-slide"><img data-src="https://你的域名.com/photo3.jpg" class="swiper-lazy"></div>
        </div>
        <div class="swiper-lazy-preloader"></div>
      </div>
    </div>

    <div class="swiper-slide page" style="background:linear-gradient(135deg,#f6d365,#fda085);">
      <h1>婚礼时间</h1>
      <p>2026年5月20日 18:00</p>
      <h1>婚礼地点</h1>
      <p>某某大酒店 · 宴会厅</p>
    </div>

    <div class="swiper-slide page" style="background:linear-gradient(135deg,#84fab0,#8fd3f4);">
      <h1>婚礼地址</h1>
      <img class="map-img" src="https://restapi.amap.com/v3/staticmap?location=116.397428,39.90923&zoom=15&size=600*300&markers=mid,,A:116.397428,39.90923&key=你的key">
      <button onclick="window.location.href='https://uri.amap.com/marker?position=116.397428,39.90923&name=某某大酒店'">一键导航</button>
    </div>

    <div class="swiper-slide page" style="background:linear-gradient(135deg,#cfd9df,#e2ebf0);">
      <h1>请填写回执</h1>
      <iframe src="你的腾讯问卷链接"></iframe>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
<script>
// Swiper 主控
const swiper = new Swiper('.swiper',{direction:'vertical',mousewheel:true});

// 照片轮播子 Swiper
document.querySelectorAll('.photo-carousel').forEach(el=>{
  new Swiper(el,{loop:true,autoplay:{delay:2000},lazy:true});
});

// 背景音乐
const music = document.getElementById("bgMusic");
document.addEventListener("click",()=>music.play());
function toggleMusic(){ music.paused?music.play():music.pause(); }

// Canvas 粒子 & 爱心
const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;
window.addEventListener('resize',()=>{width=canvas.width=window.innerWidth;height=canvas.height=window.innerHeight;});

const particles=[];
const hearts=[];
for(let i=0;i<80;i++){particles.push({x:Math.random()*width,y:Math.random()*height,r:Math.random()*2+1,speed:Math.random()*0.5+0.5,opacity:Math.random()});}
for(let i=0;i<20;i++){hearts.push({x:Math.random()*width,y:Math.random()*height,speed:Math.random()*1+0.5,opacity:Math.random()})}

function draw(){
    ctx.clearRect(0,0,width,height);
    // 白色粒子
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;
        ctx.fill();
        p.y-=p.speed;
        if(p.y<-10){p.y=height;p.x=Math.random()*width;}
    });
    // 心形
    hearts.forEach(h=>{
        const img=new Image(); img.src='https://cdn-icons-png.flaticon.com/512/833/833472.png';
        ctx.globalAlpha=h.opacity;
        ctx.drawImage(img,h.x,h.y,20,20);
        ctx.globalAlpha=1;
        h.y-=h.speed;
        if(h.y<-30){h.y=height;h.x=Math.random()*width;}
    });
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
